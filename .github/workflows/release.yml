name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          version="$(git rev-parse --short HEAD)"
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/partforge"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux CLI
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "dist/partforge-linux-amd64" \
            ./cmd/partforge
          sha256sum "dist/partforge-linux-amd64" > "dist/partforge-linux-amd64.sha256"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.version.outputs.image }}:${{ steps.version.outputs.version }}

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          IMAGE: ${{ steps.version.outputs.image }}
        run: |
          notes="Worker image: ${IMAGE}:${VERSION}"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" dist/partforge-linux-amd64 dist/partforge-linux-amd64.sha256 --clobber
          else
            gh release create "$VERSION" dist/partforge-linux-amd64 dist/partforge-linux-amd64.sha256 \
              --target "$GITHUB_SHA" \
              --title "$VERSION" \
              --notes "$notes"
          fi
