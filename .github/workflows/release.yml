name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Check module files are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

      - name: Run end-to-end tests
        run: ./e2e/run.sh

      - name: Clean up end-to-end services
        if: always()
        run: docker compose down --remove-orphans

  build-release:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          version="$(git rev-parse --short HEAD)"
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/partforge"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux CLI
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH="${arch}" go build \
              -trimpath \
              -ldflags="-s -w -X main.version=${VERSION}" \
              -o "dist/partforge-linux-${arch}" \
              ./cmd/partforge
            sha256sum "dist/partforge-linux-${arch}" > "dist/partforge-linux-${arch}.sha256"
          done

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.version.outputs.image }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.image }}:latest

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          IMAGE: ${{ steps.version.outputs.image }}
        run: |
          notes="Worker image: ${IMAGE}:${VERSION} and ${IMAGE}:latest"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" dist/partforge-linux-* --clobber
          else
            gh release create "$VERSION" dist/partforge-linux-* \
              --target "$GITHUB_SHA" \
              --title "$VERSION" \
              --notes "$notes"
          fi
