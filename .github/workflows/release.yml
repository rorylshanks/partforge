name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  go-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

      - name: Check module files are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Run vet
        run: go vet ./...

      - name: Run tests
        run: go test ./...

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Build end-to-end worker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          load: true
          tags: partforge-worker:latest
          cache-from: |
            type=gha,scope=worker-image

      - name: Run end-to-end tests
        env:
          PARTFORGE_E2E_SKIP_BUILD: "1"
        run: ./e2e/run.sh

      - name: Clean up end-to-end services
        if: always()
        run: docker compose down --remove-orphans

  build-release:
    runs-on: ubuntu-latest
    needs:
      - go-checks
      - e2e

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set version
        id: version
        run: |
          version="$(git rev-parse --short HEAD)"
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/partforge"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "image=${image}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Linux CLI
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH="${arch}" go build \
              -trimpath \
              -ldflags="-s -w -X main.version=${VERSION}" \
              -o "dist/partforge-linux-${arch}" \
              ./cmd/partforge
            sha256sum "dist/partforge-linux-${arch}" > "dist/partforge-linux-${arch}.sha256"
          done

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push worker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.version.outputs.image }}:${{ steps.version.outputs.version }}
            ${{ steps.version.outputs.image }}:latest
          cache-from: |
            type=gha,scope=worker-image
            type=registry,ref=${{ steps.version.outputs.image }}:buildcache
            type=registry,ref=${{ steps.version.outputs.image }}:latest
          cache-to: |
            type=gha,scope=worker-image,mode=max
            type=registry,ref=${{ steps.version.outputs.image }}:buildcache,mode=max

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
          IMAGE: ${{ steps.version.outputs.image }}
        run: |
          notes="Worker image: ${IMAGE}:${VERSION} and ${IMAGE}:latest"
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" dist/partforge-linux-* --clobber
          else
            gh release create "$VERSION" dist/partforge-linux-* \
              --target "$GITHUB_SHA" \
              --title "$VERSION" \
              --notes "$notes"
          fi
